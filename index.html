<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effective Communication — Panduan Belajar UAS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0C0D12;
    --surface:#15161F;
    --surface-2:#1D1F2B;
    --surface-3:#262838;
    --border:#2B2D3C;
    --text:#EEEAE2;
    --muted:#9294A6;
    --muted-2:#5F6175;
    --signal:#FF5C3D;
    --signal-dim:#3A2620;
    --wave:#5EEAD4;
    --font-display:'Fraunces', Georgia, serif;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono:'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--font-body);
    background:var(--ink);
    color:var(--text);
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--signal); color:#fff;}
  *:focus-visible{outline:2px solid var(--wave); outline-offset:2px; border-radius:4px;}

  #progress-rail{position:fixed; top:0; left:0; height:2.5px; width:0%; background:linear-gradient(90deg,var(--signal),var(--wave)); z-index:50; transition:width .1s linear;}

  .layout{display:flex; min-height:100vh;}

  nav{
    width:288px; background:var(--surface); border-right:1px solid var(--border);
    padding:30px 20px 24px; position:sticky; top:0; height:100vh;
    display:flex; flex-direction:column; flex-shrink:0;
  }
  nav .brand{display:flex; align-items:center; gap:10px; margin-bottom:4px;}
  nav .brand-mark{
    width:34px; height:34px; border-radius:9px; background:var(--signal);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-family:var(--font-mono); font-weight:700; font-size:13px; color:#0C0D12;
  }
  nav h1{font-family:var(--font-display); font-size:19px; font-weight:600; letter-spacing:-.2px; color:var(--text); line-height:1.2;}
  nav .sub{font-family:var(--font-mono); font-size:10.5px; color:var(--muted-2); letter-spacing:.08em; text-transform:uppercase; margin:6px 0 20px 44px;}

  .progress-summary{margin-bottom:18px; padding:12px 14px; background:var(--surface-2); border:1px solid var(--border); border-radius:10px;}
  .progress-summary .row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
  .progress-summary .label{font-family:var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted-2);}
  .progress-summary .count{font-family:var(--font-mono); font-size:12px; color:var(--wave); font-weight:600;}
  .progress-summary .bar{height:4px; background:var(--surface-3); border-radius:3px; overflow:hidden;}
  .progress-summary .bar-fill{height:100%; background:var(--wave); width:0%; transition:width .3s ease;}

  .search-wrap{position:relative; margin-bottom:16px;}
  .search-wrap input{
    width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    padding:9px 12px 9px 32px; border-radius:9px; font-size:13px; font-family:var(--font-body);
  }
  .search-wrap input::placeholder{color:var(--muted-2);}
  .search-wrap input:focus{border-color:var(--wave); outline:none;}
  .search-wrap .icon{position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--muted-2); pointer-events:none;}

  #navlist{overflow-y:auto; flex:1; margin:0 -6px;}
  #navlist .navitem{
    display:flex; align-items:center; gap:11px; width:100%; text-align:left;
    background:none; border:none; padding:10px 10px; border-radius:9px; cursor:pointer;
    margin-bottom:2px; transition:background .15s ease; color:var(--muted); font-family:var(--font-body);
  }
  #navlist .navitem:hover{background:var(--surface-2); color:var(--text);}
  #navlist .navitem.active{background:var(--surface-3); color:var(--text);}
  #navlist .navitem .dot{
    width:8px; height:8px; border-radius:50%; flex-shrink:0; border:1.5px solid var(--muted-2); background:transparent; transition:all .15s ease;
  }
  #navlist .navitem.done .dot{background:var(--wave); border-color:var(--wave);}
  #navlist .navitem.active .dot{border-color:var(--signal);}
  #navlist .navitem .num{font-family:var(--font-mono); font-size:10.5px; color:var(--muted-2); flex-shrink:0; width:16px;}
  #navlist .navitem .ttl{font-size:13.5px; line-height:1.3;}
  #navlist .navitem.active .ttl{font-weight:600;}
  #navlist .navitem.hidden{display:none;}
  #navlist .empty-hint{font-family:var(--font-mono); font-size:11.5px; color:var(--muted-2); padding:14px 10px;}

  main{flex:1; padding:56px 64px 80px; max-width:820px;}
  section{display:none;}
  section.active{display:block; animation:rise .4s cubic-bezier(.2,.8,.2,1);}
  @keyframes rise{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}

  .eyebrow{display:flex; align-items:center; gap:10px; margin-bottom:16px;}
  .eyebrow .tag{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--signal); border:1px solid var(--signal-dim); background:var(--signal-dim);
    padding:5px 11px; border-radius:20px; font-weight:600;
  }
  .eyebrow .signal-bars{display:flex; align-items:flex-end; gap:2px; height:12px;}
  .eyebrow .signal-bars span{width:3px; background:var(--wave); border-radius:1px; opacity:.85;}

  h2{font-family:var(--font-display); color:var(--text); font-size:38px; font-weight:600; letter-spacing:-.5px; margin-bottom:10px; line-height:1.1;}
  h3{font-family:var(--font-display); color:var(--text); font-size:20px; font-weight:600; margin:34px 0 12px; display:flex; align-items:center; gap:10px;}
  h3::before{content:''; width:16px; height:1.5px; background:var(--signal); flex-shrink:0;}
  p.lead{color:var(--muted); margin-bottom:30px; font-size:15.5px; max-width:60ch;}

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:18px 20px; margin-bottom:12px; font-size:14.5px;
    transition:border-color .2s ease, transform .2s ease;
  }
  .card:hover{border-color:var(--muted-2); transform:translateY(-1px);}
  .card b{color:var(--wave); font-weight:600;}
  ul{margin-left:20px; margin-bottom:10px;}
  li{margin-bottom:7px; font-size:14.5px; color:var(--text);}
  li::marker{color:var(--signal);}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media(max-width:700px){.grid{grid-template-columns:1fr;}}

  table{width:100%; border-collapse:collapse; margin:14px 0; font-size:13px; border-radius:10px; overflow:hidden; border:1px solid var(--border);}
  th,td{padding:11px 13px; text-align:left; border-bottom:1px solid var(--border);}
  th{background:var(--surface-2); color:var(--wave); font-weight:600; font-family:var(--font-mono); font-size:11px; letter-spacing:.04em; text-transform:uppercase;}
  td{background:var(--surface);}
  tr:last-child td{border-bottom:none;}

  .quote{
    position:relative; border-left:2px solid var(--signal); background:var(--surface-2);
    padding:16px 20px; font-style:italic; color:#D8D4C8; border-radius:0 10px 10px 0; margin:16px 0; font-size:14.5px;
  }

  .footer-nav{display:flex; justify-content:space-between; gap:12px; margin-top:44px; padding-top:22px; border-top:1px solid var(--border);}
  .footer-nav button{
    background:var(--surface-2); color:var(--text); border:1px solid var(--border); padding:11px 18px; border-radius:9px;
    cursor:pointer; font-size:13px; font-weight:600; font-family:var(--font-body); transition:all .18s ease;
  }
  .footer-nav button:hover{background:var(--signal); border-color:var(--signal); color:#0C0D12;}

  .mark-done{
    display:inline-flex; align-items:center; gap:8px; margin-top:6px; margin-bottom:8px;
    background:var(--surface); border:1px solid var(--border); padding:9px 16px; border-radius:9px;
    cursor:pointer; font-family:var(--font-mono); font-size:11.5px; letter-spacing:.04em; color:var(--muted); transition:all .15s ease;
  }
  .mark-done:hover{border-color:var(--wave); color:var(--text);}
  .mark-done.on{background:rgba(94,234,212,.1); border-color:var(--wave); color:var(--wave);}

  .menu-toggle{display:none;}
  @media(max-width:860px){
    nav{position:fixed; left:-300px; z-index:20; transition:left .22s ease; width:280px; box-shadow:0 0 40px rgba(0,0,0,.5);}
    nav.open{left:0;}
    main{padding:76px 22px 50px;}
    .menu-toggle{
      display:flex; align-items:center; justify-content:center; position:fixed; top:16px; left:16px; z-index:21;
      background:var(--surface-2); border:1px solid var(--border); color:var(--text); width:40px; height:40px;
      border-radius:9px; font-size:16px; cursor:pointer;
    }
    h2{font-size:29px;}
  }
</style>
</head>
<body>
<div id="progress-rail"></div>
<button class="menu-toggle" onclick="document.querySelector('nav').classList.toggle('open')" aria-label="Buka menu">☰</button>
<div class="layout">
  <nav>
    <div class="brand">
      <div class="brand-mark">EC</div>
      <h1>Effective&nbsp;Comm.</h1>
    </div>
    <div class="sub">Panduan Belajar UAS</div>

    <div class="progress-summary">
      <div class="row">
        <span class="label">Progres Baca</span>
        <span class="count" id="progress-count">0/6</span>
      </div>
      <div class="bar"><div class="bar-fill" id="progress-fill"></div></div>
    </div>

    <div class="search-wrap">
      <span class="icon">⌕</span>
      <input type="text" id="search" placeholder="Cari topik…" autocomplete="off">
    </div>

    <div id="navlist"></div>
  </nav>
  <main id="main"></main>
</div>

  html:`
  <h3>Latar Belakang</h3>
  <div class="card">Mifta Thota (2013:160) menegaskan komunikasi adalah elemen fundamental dalam manajemen dan administrasi. Istilah ini berasal dari kata Latin <i>communis</i> yang berarti "bersama" — mencakup transfer pengetahuan, penyampaian gagasan, hingga pertukaran pemikiran melalui media lisan maupun tulisan. Menurut Agus (2003), komunikasi dikelompokkan menjadi lisan, tertulis, dan (versi modern) elektronik.</div>
  <div class="card">Buruknya komunikasi memicu hambatan manajemen, sedangkan interaksi yang solid antar departemen menciptakan iklim kerja yang sehat dan konstruktif.</div>

  <h3>Definisi Komunikasi Tertulis</h3>
  <div class="card">Segala jenis pertukaran informasi yang memanfaatkan simbol tulisan sebagai perantara — mulai dari surat konvensional, faksimili, hingga e-mail.</div>

  <h3>Tujuan Komunikasi Tertulis</h3>
  <div class="grid">
    <div class="card"><b>Informasi</b> — Menyalurkan pengetahuan & agenda belajar secara sistematis (mis. jadwal mingguan).</div>
    <div class="card"><b>Instruksi</b> — Menyediakan panduan teknis & prosedur kerja agar minim kekeliruan.</div>
    <div class="card"><b>Evaluasi</b> — Memberikan umpan balik objektif lewat laporan hasil belajar.</div>
    <div class="card"><b>Dokumentasi</b> — Menciptakan rekam jejak formal (notulensi, arsip) untuk transparansi & akuntabilitas.</div>
  </div>

  <h3>Karakteristik Komunikasi Tertulis</h3>
  <ul>
    <li><b>Daya Tahan (Permanensi)</b> — pesan bersifat tetap & terdokumentasi.</li>
    <li><b>Persiapan Matang</b> — butuh waktu lebih lama, memperhatikan tata bahasa & struktur.</li>
    <li><b>Satu Arah (Delayed Feedback)</b> — umpan balik tidak instan.</li>
    <li><b>Presisi & Jelas</b> — tanpa bantuan nada suara/ekspresi wajah, kata harus akurat.</li>
  </ul>

  <h3>Jenis-Jenis Komunikasi Tertulis</h3>
  <table>
    <tr><th>Dunia Akademik</th><th>Dunia Profesional</th></tr>
    <tr><td>Makalah/Paper — tulisan ilmiah berargumen</td><td>Surat Resmi/Email — komunikasi formal antar individu/institusi</td></tr>
    <tr><td>Laporan Penelitian — dokumen hasil riset sistematis</td><td>Laporan Kerja — dokumen pertanggungjawaban pekerjaan</td></tr>
    <tr><td>Skripsi/Tesis/Disertasi — karya ilmiah gelar akademik</td><td>Proposal Bisnis — rencana kerja sama/proyek</td></tr>
    <tr><td>Abstrak — ringkasan singkat karya ilmiah</td><td>Memo Internal — pesan singkat dalam organisasi</td></tr>
    <tr><td>Esai Akademik — argumen/analisis berbasis teori & fakta</td><td>Kontrak & SOP — dokumen hukum & prosedur kerja</td></tr>
  </table>

  <h3>Jenis Komunikasi Tertulis Dunia Profesional (Lengkap)</h3>
  <ul>
    <li><b>Email Bisnis</b> — alat komunikasi harian utama; ringkas, formal, subject line jelas.</li>
    <li><b>Memo (Memorandum)</b> — pesan internal formal untuk mengumumkan kebijakan/perubahan regulasi.</li>
    <li><b>Proposal Bisnis</b> — dokumen persuasif menawarkan solusi/produk untuk menarik klien.</li>
    <li><b>Laporan Bisnis & Kinerja</b> — penyajian data faktual (keuangan, analisis pasar, progres proyek).</li>
    <li><b>SOP (Standard Operating Procedure)</b> — panduan langkah demi langkah agar operasional konsisten & aman.</li>
    <li><b>Konten & Dokumen Pemasaran</b> — copywriting, konten medsos, press release untuk mendorong konversi.</li>
  </ul>

  <h3>Fungsi & Manfaat</h3>
  <ul>
    <li><b>Dokumentasi</b> — menyimpan informasi permanen & terstruktur.</li>
    <li><b>Koordinasi</b> — menyeragamkan pemahaman dalam organisasi.</li>
    <li><b>Penyebaran Informasi</b> — menjangkau banyak pihak bersamaan.</li>
    <li><b>Pengembangan Ilmu</b> — media penyebaran pengetahuan & hasil penelitian.</li>
    <li><b>Bukti & Legalitas</b> — sah secara hukum & dapat dipertanggungjawabkan, sekaligus mendorong berpikir kritis & terorganisir.</li>
  </ul>

  <h3>Struktur Dokumen</h3>
  <div class="grid">
    <div class="card"><b>Dokumen Profesional</b><ul><li>Kepala surat/identitas</li><li>Tujuan dokumen</li><li>Isi utama</li><li>Penutup</li><li>Lampiran/tanda tangan</li></ul></div>
    <div class="card"><b>Dokumen Akademik</b><ul><li>Judul</li><li>Pendahuluan</li><li>Pembahasan</li><li>Kesimpulan</li><li>Daftar pustaka</li></ul></div>
  </div>

  <h3>Format Penulisan</h3>
  <ul>
    <li>Font formal (Times New Roman/Arial), ukuran 11–12 pt</li>
    <li>Spasi 1,5 atau 2</li>
    <li>Heading & subheading jelas</li>
    <li>Penulisan rapi & terstruktur</li>
  </ul>

  <h3>Prinsip Penulisan Efektif</h3>
  <div class="card">Penulisan efektif adalah cara menyampaikan pesan secara jelas & tepat agar pembaca langsung memahami maksud penulis — penting untuk menghindari kesalahpahaman, membangun kepercayaan, dan memastikan pesan tersampaikan sesuai tujuan.</div>
  <ul>
    <li><b>Pemahaman terhadap Pembaca</b> — sesuaikan isi dengan latar belakang pembaca.</li>
    <li><b>Ketepatan Bahasa & Pemilihan Kata</b> — kalimat tidak berbelit-belit.</li>
    <li><b>Etika dalam Penulisan</b> — informasi benar & dapat dipertanggungjawabkan.</li>
    <li><b>Kesesuaian Gaya Penulisan dengan Konteks</b> — makalah ilmiah formal, email sopan, proposal terstruktur.</li>
  </ul>

  <h3>Kesalahan Umum dalam Komunikasi Tertulis</h3>
  <ul>
    <li>Bahasa kurang jelas/bertele-tele/ambigu</li>
    <li>Kesalahan ejaan & tata bahasa (typo, tanda baca)</li>
    <li>Pemilihan kata tidak sesuai (terlalu santai/kurang sopan)</li>
    <li>Informasi tidak lengkap (waktu, tujuan, instruksi hilang)</li>
    <li>Tidak memperhatikan struktur penulisan (tanpa pembukaan-isi-penutup)</li>
  </ul>

  <h3>Ciri-Ciri Komunikasi Tertulis yang Baik</h3>
  <ul>
    <li>✔ Jelas dan mudah dipahami</li>
    <li>✔ Singkat, padat, tidak bertele-tele</li>
    <li>✔ Bahasa baku dan sopan</li>
    <li>✔ Disusun sistematis</li>
    <li>✔ Isi sesuai tujuan dan pembaca</li>
  </ul>

  <h3>Implementasi dalam Portofolio</h3>
  <div class="card">Portofolio adalah bentuk implementasi komunikasi tertulis yang baik — memuat latar belakang pendidikan, spesialisasi, tools yang dikuasai, pengalaman kerja (dengan tahun yang relevan), serta kontak/media sosial agar mudah dihubungi perekrut atau klien.</div>

  <h3>Teknik 5W+1H dalam Penulisan</h3>
  <div class="card">Sebelum menulis, jawab dulu: <b>What</b> (apa isi pesan), <b>Why</b> (tujuan penulisan), <b>Who</b> (siapa pembaca), <b>When</b> (kapan disampaikan/tenggat), <b>Where</b> (di mana/media apa), <b>How</b> (bagaimana cara penyampaian). Kerangka ini memastikan tulisan tidak melenceng dari tujuan.</div>

  <h3>Prinsip 7C Komunikasi Tertulis</h3>
  <ul>
    <li><b>Clear</b> — maksud tunggal, tidak multitafsir</li>
    <li><b>Concise</b> — hindari kata mubazir & pengulangan</li>
    <li><b>Concrete</b> — fakta & data spesifik, bukan generalisasi</li>
    <li><b>Correct</b> — tata bahasa, ejaan, dan data akurat</li>
    <li><b>Coherent</b> — antar kalimat/paragraf saling berkaitan logis</li>
    <li><b>Complete</b> — memuat semua informasi yang dibutuhkan pembaca</li>
    <li><b>Courteous</b> — sopan, menghargai sudut pandang pembaca</li>
  </ul>

  <h3>Tahapan Proses Menulis</h3>
  <ul>
    <li>1. <b>Pra-menulis</b> — riset, kumpulkan data, tentukan tujuan & audiens</li>
    <li>2. <b>Menyusun Draf</b> — tuangkan gagasan tanpa terlalu fokus pada kesempurnaan</li>
    <li>3. <b>Revisi</b> — periksa kembali alur logika & kelengkapan isi</li>
    <li>4. <b>Penyuntingan (Editing)</b> — perbaiki ejaan, tanda baca, & tata bahasa</li>
    <li>5. <b>Publikasi/Pengiriman</b> — dokumen siap disampaikan ke pembaca</li>
  </ul>

  <h3>Etika Email Profesional</h3>
  <ul>
    <li>Gunakan subject line yang spesifik & informatif</li>
    <li>Salam pembuka & penutup yang sesuai konteks budaya/organisasi</li>
    <li>Hindari huruf kapital berlebihan (dianggap "berteriak")</li>
    <li>Balas email dalam waktu wajar (1x24 jam kerja)</li>
    <li>Periksa ulang lampiran sebelum mengirim</li>
  </ul>

  <h3>Perbedaan Bahasa Formal & Informal dalam Tulisan</h3>
  <table>
    <tr><th>Aspek</th><th>Formal</th><th>Informal</th></tr>

    <tr><td>Konteks Pemakaian</td><td>Surat dinas, laporan, skripsi</td><td>Chat, media sosial</td></tr>

  <h3>Kesimpulan & Saran</h3>

    <li>Komunikasi tertulis penting dalam dunia akademik & profesional</li>

  </ul>
  `

  html:`
  <h3>Tahap 1 — Bangun Big Picture (30–45 menit)</h3>

const navlist = document.getElementById('navlist');
const main = document.getElementById('main');
const done = new Set(); // in-memory reading progress (resets on reload)

data.forEach((d,i)=>{
  const item = document.createElement('button');
  item.className = 'navitem';
  item.id = 'nav-'+d.id;
  item.dataset.search = (d.title+' '+d.tag+' '+d.lead+' '+d.html).replace(/<[^>]+>/g,' ').toLowerCase();
  item.innerHTML = `<span class="dot"></span><span class="num">${String(i+1).padStart(2,'0')}</span><span class="ttl">${d.title}</span>`;
  item.onclick = ()=> showSection(d.id);
  navlist.appendChild(item);

  const sec = document.createElement('section');
  sec.id = d.id;
  sec.innerHTML = `
    <div class="eyebrow">
      <span class="tag">${d.tag}</span>
      <span class="signal-bars" aria-hidden="true"><span style="height:4px"></span><span style="height:8px"></span><span style="height:12px"></span><span style="height:6px"></span></span>
    </div>
    <h2>${d.title}</h2>
    <p class="lead">${d.lead}</p>
    <button class="mark-done" id="done-${d.id}" onclick="toggleDone('${d.id}')">○ &nbsp;Tandai selesai dibaca</button>
    ${d.html}
    <div class="footer-nav">
      <button onclick="${i>0 ? `showSection('${data[i-1].id}')` : 'void(0)'}" ${i===0?'style="visibility:hidden"':''}>← Sebelumnya</button>
      <button onclick="${i<data.length-1 ? `showSection('${data[i+1].id}')` : 'void(0)'}" ${i===data.length-1?'style="visibility:hidden"':''}>Selanjutnya →</button>
    </div>
  `;
  main.appendChild(sec);
});

function updateProgress(){
  document.getElementById('progress-count').textContent = done.size+'/'+data.length;
  document.getElementById('progress-fill').style.width = (done.size/data.length*100)+'%';
}

function toggleDone(id){
  const btn = document.getElementById('done-'+id);
  const navdot = document.getElementById('nav-'+id);
  if(done.has(id)){
    done.delete(id); btn.classList.remove('on'); btn.innerHTML = '○ &nbsp;Tandai selesai dibaca';
    navdot.classList.remove('done');
  }else{
    done.add(id); btn.classList.add('on'); btn.innerHTML = '● &nbsp;Selesai dibaca';
    navdot.classList.add('done');
  }
  updateProgress();
}

function showSection(id){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.navitem').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  main.scrollTo(0,0);
  window.scrollTo(0,0);
  document.querySelector('nav').classList.remove('open');
  updateRail();
}

function updateRail(){
  const rail = document.getElementById('progress-rail');
  const h = document.documentElement;
  const scrolled = (h.scrollTop) / (h.scrollHeight - h.clientHeight || 1) * 100;
  rail.style.width = Math.min(scrolled,100)+'%';
}
window.addEventListener('scroll', updateRail);

document.getElementById('search').addEventListener('input', (e)=>{
  const q = e.target.value.trim().toLowerCase();
  const items = document.querySelectorAll('.navitem');
  let visible = 0;
  items.forEach(it=>{
    const match = !q || it.dataset.search.includes(q);
    it.classList.toggle('hidden', !match);
    if(match) visible++;
  });
  let hint = navlist.querySelector('.empty-hint');
  if(visible===0){
    if(!hint){ hint = document.createElement('div'); hint.className='empty-hint'; navlist.appendChild(hint); }
    hint.textContent = 'Tidak ada topik yang cocok.';
  } else if(hint){ hint.remove(); }
});

document.addEventListener('keydown', (e)=>{
  if(document.activeElement.id === 'search') return;
  const activeIdx = data.findIndex(d=>document.getElementById(d.id).classList.contains('active'));
  if(e.key === 'ArrowRight' && activeIdx < data.length-1) showSection(data[activeIdx+1].id);
  if(e.key === 'ArrowLeft' && activeIdx > 0) showSection(data[activeIdx-1].id);
});

showSection(data[0].id);
</script>
</body>
</html>
